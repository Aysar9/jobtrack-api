server {
    listen 80;
    server_name localhost;

    # Wo die Dateien liegen — der Symfony "public"-Ordner ist die Tür
    root /var/www/public;

    location / {
        # Versuche die Datei direkt; wenn nicht da, gib alles an index.php
        try_files $uri /index.php$is_args$args;
    }

    # Alle PHP-Anfragen an den php-Container weiterreichen
    location ~ ^/index\.php(/|$) {
        # "php" = der Name des Containers aus docker-compose.yml, Port 9000
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Verhindert, dass andere .php-Dateien direkt aufrufbar sind
        internal;
    }

    # Jede andere .php-Datei direkt aufzurufen ist verboten (Sicherheit)
    location ~ \.php$ {
        return 404;
    }
}
name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      database:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: jobtrack_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, intl, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations (test database)
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/jobtrack?serverVersion=8.0&charset=utf8mb4"
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/jobtrack?serverVersion=8.0&charset=utf8mb4"
        run: php bin/phpunit
services:
  # ---- Container 1: PHP-FPM (unsere "Küche") ----
  php:
    build: .
    volumes:
      - .:/var/www
    depends_on:
      - database

  # ---- Container 2: Nginx (unser "Kellner") ----
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # ---- Container 3: MySQL (die Datenbank) ----
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: jobtrack
      MYSQL_USER: jobtrack
      MYSQL_PASSWORD: jobtrack
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - database_data:/var/lib/mysql

# ---- Named Volume: damit DB-Daten Container-Neustarts überleben ----
volumes:
  database_data:

